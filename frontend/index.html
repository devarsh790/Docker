
<!DOCTYPE html>
<html>
<head>
  <title>Dockerized Full Stack App</title>
</head>
<body>
  <h1>Dockerized Full Stack Web Application</h1>
  <button onclick="loadMessage()">Get Backend Message</button>
  <p id="msg"></p>

<script>
function loadMessage(){
 fetch('http://localhost:5000/api/message')
  .then(res => res.json())
  .then(data => {
    document.getElementById("msg").innerText = data.message;
  });
}
</script>

</body>
</html>
